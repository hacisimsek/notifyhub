name: Kubernetes CI

on:
  pull_request:
    paths:
      - "deploy/k8s/**"
      - "scripts/k8s-local-verify.sh"
      - "scripts/gateway-e2e-smoke.sh"
      - ".github/workflows/kubernetes-ci.yml"
  push:
    branches:
      - main
    paths:
      - "deploy/k8s/**"
      - "scripts/k8s-local-verify.sh"
      - "scripts/gateway-e2e-smoke.sh"
      - ".github/workflows/kubernetes-ci.yml"

jobs:
  validate:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse manifest YAML
        run: ruby -e 'require "yaml"; ARGV.each { |file| YAML.load_stream(File.read(file)); puts file }' deploy/k8s/base/*.yaml

      - name: Check Kubernetes scripts
        run: bash -n scripts/k8s-local-verify.sh scripts/gateway-e2e-smoke.sh

      - name: Render kustomization
        run: kubectl kustomize deploy/k8s/base
