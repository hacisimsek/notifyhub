name: Local Stack CI

on:
  pull_request:
    paths:
      - "deploy/docker/**"
      - "observability/**"
      - "backend/Dockerfile"
      - "web/dashboard/Dockerfile"
      - "web/dashboard/nginx.conf"
      - "scripts/local-stack-e2e.sh"
      - "scripts/gateway-e2e-smoke.sh"
      - "scripts/smoke-check.sh"
      - ".github/workflows/local-stack-ci.yml"
  push:
    branches:
      - main
    paths:
      - "deploy/docker/**"
      - "observability/**"
      - "backend/Dockerfile"
      - "web/dashboard/Dockerfile"
      - "web/dashboard/nginx.conf"
      - "scripts/local-stack-e2e.sh"
      - "scripts/gateway-e2e-smoke.sh"
      - "scripts/smoke-check.sh"
      - ".github/workflows/local-stack-ci.yml"

jobs:
  validate:
    name: Validate local stack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Render compose config
        run: docker compose --env-file deploy/docker/.env.example -f deploy/docker/compose.yml config

      - name: List compose services
        run: docker compose --env-file deploy/docker/.env.example -f deploy/docker/compose.yml config --services

      - name: Check local stack scripts
        run: bash -n scripts/local-stack-e2e.sh scripts/gateway-e2e-smoke.sh scripts/smoke-check.sh

      - name: Check Prometheus config
        run: >
          docker run --rm
          --entrypoint promtool
          -v "${{ github.workspace }}/observability/prometheus:/etc/prometheus:ro"
          prom/prometheus:v2.54.1
          check config /etc/prometheus/prometheus.yml

      - name: Check Prometheus alert rules
        run: >
          docker run --rm
          --entrypoint promtool
          -v "${{ github.workspace }}/observability/prometheus:/etc/prometheus:ro"
          prom/prometheus:v2.54.1
          check rules /etc/prometheus/rules/notifyhub-alerts.yml
