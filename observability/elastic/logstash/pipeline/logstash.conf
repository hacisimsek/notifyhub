input {
  gelf {
    port => 12201
    use_udp => true
  }
}

filter {
  mutate {
    add_field => {
      "[service][namespace]" => "notifyhub"
      "[event][dataset]" => "notifyhub.container"
      "[data_stream][type]" => "logs"
      "[data_stream][dataset]" => "notifyhub"
      "[data_stream][namespace]" => "local"
    }
  }

  if [container_name] {
    mutate {
      rename => { "container_name" => "[container][name]" }
    }
  }

  if [container_id] {
    mutate {
      rename => { "container_id" => "[container][id]" }
    }
  }

  if [image_name] {
    mutate {
      rename => { "image_name" => "[container][image][name]" }
    }
  }

  if [source_host] {
    mutate {
      rename => { "source_host" => "[source][address]" }
    }
  }

  if [short_message] and ![message] {
    mutate {
      rename => { "short_message" => "message" }
    }
  }

  if [message] =~ /notifyhub_audit / {
    grok {
      match => { "message" => "notifyhub_audit %{GREEDYDATA:[@metadata][notifyhub_audit_json]}" }
      tag_on_failure => ["_notifyhub_audit_grok_failure"]
    }

    if [@metadata][notifyhub_audit_json] {
      json {
        source => "[@metadata][notifyhub_audit_json]"
        target => "[audit]"
        tag_on_failure => ["_notifyhub_audit_json_failure"]
      }
    }

    if [audit][message] {
      mutate {
        replace => { "message" => "%{[audit][message]}" }
        add_field => { "[notifyhub][audit]" => "true" }
      }
      mutate {
        convert => { "[notifyhub][audit]" => "boolean" }
      }
    }

    if [audit][event][action] {
      mutate { add_field => { "[event][action]" => "%{[audit][event][action]}" } }
    }

    if [audit][event][category] {
      mutate { add_field => { "[event][category]" => "%{[audit][event][category]}" } }
    }

    if [audit][event][outcome] {
      mutate { add_field => { "[event][outcome]" => "%{[audit][event][outcome]}" } }
    }

    if [audit][request][id] {
      mutate { add_field => { "[request][id]" => "%{[audit][request][id]}" } }
    }

    if [audit][user][id] {
      mutate { add_field => { "[user][id]" => "%{[audit][user][id]}" } }
    }

    if [audit][user][email] {
      mutate { add_field => { "[user][email]" => "%{[audit][user][email]}" } }
    }

    if [audit][resource][type] {
      mutate { add_field => { "[notifyhub][resource][type]" => "%{[audit][resource][type]}" } }
    }

    if [audit][resource][id] {
      mutate { add_field => { "[notifyhub][resource][id]" => "%{[audit][resource][id]}" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    data_stream => true
    data_stream_type => "logs"
    data_stream_dataset => "notifyhub"
    data_stream_namespace => "local"
  }
}
