apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  labels:
    app.kubernetes.io/name: gateway-service
    app.kubernetes.io/part-of: notifyhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-service
        app.kubernetes.io/part-of: notifyhub
    spec:
      containers:
        - name: gateway-service
          image: notifyhub/gateway-service:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AUTH_JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: notifyhub-config
                  key: AUTH_JWT_ISSUER
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: notifyhub-secrets
                  key: AUTH_JWT_SECRET
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: notifyhub-config
                  key: AUTH_SERVICE_URL
            - name: REMINDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: notifyhub-config
                  key: REMINDER_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: notifyhub-config
                  key: NOTIFICATION_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
