apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: notifyhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: notifyhub
    spec:
      containers:
        - name: auth-service
          image: notifyhub/auth-service:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: AUTH_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: notifyhub-config
                  key: AUTH_DB_URL
            - name: AUTH_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notifyhub-secrets
                  key: POSTGRES_USER
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notifyhub-secrets
                  key: POSTGRES_PASSWORD
            - name: AUTH_JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: notifyhub-config
                  key: AUTH_JWT_ISSUER
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: notifyhub-secrets
                  key: AUTH_JWT_SECRET
            - name: AUTH_JWT_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: notifyhub-config
                  key: AUTH_JWT_EXPIRATION
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 75
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: notifyhub
spec:
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: http
---
