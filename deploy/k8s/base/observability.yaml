apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: notifyhub
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - prometheus:9090

      - job_name: gateway-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - gateway-service:8080

      - job_name: auth-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - auth-service:8081

      - job_name: reminder-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - reminder-service:8082

      - job_name: notification-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - notification-service:8083
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: notifyhub
data:
  notifyhub-alerts.yml: |
    groups:
      - name: notifyhub-service-health
        rules:
          - alert: NotifyHubServiceDown
            expr: up{job=~"gateway-service|auth-service|reminder-service|notification-service"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} is down"
              description: "Prometheus has not been able to scrape {{ $labels.job }} for at least 1 minute."

          - alert: NotifyHubHighServerErrorRate
            expr: sum by (job) (rate(http_server_requests_seconds_count{job=~"gateway-service|auth-service|reminder-service|notification-service", status=~"5.."}[5m])) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.job }} has elevated 5xx responses"
              description: "{{ $labels.job }} is returning more than 0.1 5xx responses per second over 5 minutes."

      - name: notifyhub-notification-delivery
        rules:
          - alert: NotifyHubNotificationDeliveryFailures
            expr: increase(notifyhub_notification_delivery_attempts_total{status="FAILED"}[10m]) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Notification delivery failures detected"
              description: "At least one notification delivery attempt exhausted retries and failed in the last 10 minutes."

          - alert: NotifyHubNotificationDeliveryRetries
            expr: increase(notifyhub_notification_delivery_attempts_total{status="RETRYING"}[10m]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Notification delivery retry volume is elevated"
              description: "More than 3 notification delivery attempts entered retry state in the last 10 minutes."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: notifyhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: notifyhub
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: prometheus-alert-rules
              mountPath: /etc/prometheus/rules
              readOnly: true
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-alert-rules
          configMap:
            name: prometheus-alert-rules
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: notifyhub
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 30090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: notifyhub
data:
  prometheus.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: notifyhub-prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: notifyhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: notifyhub
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: notifyhub-secrets
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notifyhub-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: notifyhub
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30300
