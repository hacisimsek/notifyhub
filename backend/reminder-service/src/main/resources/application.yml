server:
  port: 8082

spring:
  application:
    name: reminder-service
  datasource:
    url: ${REMINDER_DB_URL:jdbc:postgresql://localhost:5432/notifyhub_reminder}
    username: ${REMINDER_DB_USERNAME:notifyhub}
    password: ${REMINDER_DB_PASSWORD:notifyhub}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
