server:
  port: 8083

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_NOTIFICATION_GROUP_ID:notification-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.notifyhub.common.events
        spring.json.value.default.type: com.notifyhub.common.events.ReminderTriggeredEvent
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/notifyhub_notification}
    username: ${NOTIFICATION_DB_USERNAME:notifyhub}
    password: ${NOTIFICATION_DB_PASSWORD:notifyhub}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

notifyhub:
  messaging:
    kafka:
      enabled: ${KAFKA_ENABLED:false}
    topics:
      reminder-triggered: ${KAFKA_TOPIC_REMINDER_TRIGGERED:reminder.triggered}

management:
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
