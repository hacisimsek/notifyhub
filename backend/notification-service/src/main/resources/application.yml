server:
  port: 8083

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_NOTIFICATION_GROUP_ID:notification-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.notifyhub.common.events
        spring.json.value.default.type: com.notifyhub.common.events.ReminderTriggeredEvent
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/notifyhub_notification}
    username: ${NOTIFICATION_DB_USERNAME:notifyhub}
    password: ${NOTIFICATION_DB_PASSWORD:notifyhub}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

notifyhub:
  messaging:
    kafka:
      enabled: ${KAFKA_ENABLED:false}
    topics:
      reminder-triggered: ${KAFKA_TOPIC_REMINDER_TRIGGERED:reminder.triggered}
  delivery:
    rabbitmq:
      enabled: ${RABBITMQ_ENABLED:false}
      exchange: ${NOTIFICATION_DELIVERY_EXCHANGE:notifyhub.notifications.delivery}
      retry-exchange: ${NOTIFICATION_DELIVERY_RETRY_EXCHANGE:notifyhub.notifications.retry}
      dead-letter-exchange: ${NOTIFICATION_DELIVERY_DLX:notifyhub.notifications.dlx}
      queue: ${NOTIFICATION_DELIVERY_QUEUE:notifyhub.notifications.delivery}
      retry-queue: ${NOTIFICATION_DELIVERY_RETRY_QUEUE:notifyhub.notifications.delivery.retry}
      dead-letter-queue: ${NOTIFICATION_DELIVERY_DLQ:notifyhub.notifications.delivery.dlq}
      routing-key: ${NOTIFICATION_DELIVERY_ROUTING_KEY:notification.delivery}
      retry-routing-key: ${NOTIFICATION_DELIVERY_RETRY_ROUTING_KEY:notification.retry}
      dead-letter-routing-key: ${NOTIFICATION_DELIVERY_DLQ_ROUTING_KEY:notification.failed}
      max-attempts: ${NOTIFICATION_DELIVERY_MAX_ATTEMPTS:3}
      retry-delay-ms: ${NOTIFICATION_DELIVERY_RETRY_DELAY_MS:5000}

management:
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
